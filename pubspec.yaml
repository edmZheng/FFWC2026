name: worldcup_tracker
description: 2026 FIFA World Cup schedule tracker app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  go_router: ^14.6.2
  shared_preferences: ^2.3.2
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  google_fonts: ^6.2.1
  device_calendar: 4.3.3
  video_player: ^2.9.2
  timezone: ^0.9.4
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  video_player_platform_interface: ^6.7.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/games.json
    - assets/data/teams.json
    - assets/data/stadiums.json
    - assets/data/groups.json
    - assets/data/squads.json
    - assets/data/fifa_rankings.json
    - assets/data/match_id_map.json
    - assets/icon/
    - assets/stadiums/
    - assets/titles/
    - assets/videos/